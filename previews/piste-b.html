<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Piste B — Index éditorial · Preview Carrousel Bastien Agus</title>
<base href="/">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Ms+Madi&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0a; --ink:#f5f5f5; --red:#d90429; --red-text:#ff3b5c;
  --ink-dim: rgba(245,245,245,.6);
  --display:'Bebas Neue',sans-serif; --sans:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace; --script:'Ms Madi',cursive;
  --ease:cubic-bezier(.22,.61,.36,1);
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }

.preview-back {
  position: fixed; top: 20px; left: 20px; z-index: 100;
  padding: 12px 16px; background: rgba(10,10,10,.7); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,.15);
  font: 600 11px/1 var(--mono); letter-spacing: .16em; color: var(--ink);
  transition: border-color .3s ease, background .3s ease;
}
.preview-back:hover { border-color: var(--red); background: rgba(217,4,41,.15); }

/* ——— Header ——— */
.b-header {
  padding: 96px 56px 40px; max-width: 1600px; margin: 0 auto;
  display: grid; grid-template-columns: 1fr auto; gap: 40px; align-items: end;
}
.b-header__block { max-width: 720px; }
.b-header__eyebrow { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
.b-header__eyebrow-line { width: 44px; height: 1px; background: var(--red); }
.b-header__eyebrow-text { font: 500 12px/1 var(--mono); letter-spacing: .18em; color: var(--red-text); }
.b-header__titles { display: flex; align-items: baseline; gap: 20px; flex-wrap: wrap; }
.b-header__title { font-family: var(--display); font-size: min(9vw,120px); line-height: .85; letter-spacing: .01em; }
.b-header__title .red { color: var(--red); }
.b-header__script { font-family: var(--script); font-size: min(4vw,44px); color: rgba(217,4,41,.55); }
.b-header__lead { font: 300 16px/1.55 var(--sans); color: var(--ink-dim); max-width: 560px; margin-top: 24px; }
.b-header__meta { text-align: right; font: 500 11px/1.5 var(--mono); letter-spacing: .16em; color: var(--ink-dim); }
.b-header__meta b { display: block; font-family: var(--display); font-size: 36px; letter-spacing: .04em; color: var(--ink); }

/* ——— Grid ——— */
.b-index { padding: 20px 56px 120px; max-width: 1600px; margin: 0 auto; }
.b-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  grid-auto-rows: 18vh;
  grid-auto-flow: dense;
  gap: 8px;
  min-height: 60vh;
}

.b-tile {
  position: relative; overflow: hidden; display: block;
  background: #131313;
  grid-column: span 2; grid-row: span 1;
  transition: filter .5s var(--ease), transform .5s var(--ease);
  will-change: filter, transform;
}
.b-tile[data-feat="hero"] { grid-column: span 3; grid-row: span 3; }
.b-tile[data-feat="wide"] { grid-column: span 4; grid-row: span 2; }
.b-tile[data-feat="tall"] { grid-column: span 2; grid-row: span 3; }
.b-tile[data-feat="square"] { grid-column: span 2; grid-row: span 2; }

.b-tile__img {
  position: absolute; inset: 0; background-size: cover; background-position: center;
  transition: transform 1s var(--ease), filter .5s var(--ease);
  filter: grayscale(30%) brightness(.75);
  transform: scale(1.02);
}
.b-tile__scrim {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(10,10,10,.9) 0%, rgba(10,10,10,.2) 60%, transparent 100%);
  opacity: .85; transition: opacity .5s var(--ease);
}
.b-tile__rail {
  position: absolute; left: 0; top: 25%; width: 3px; height: 50%; background: var(--red);
  transform: scaleY(0); transform-origin: top; transition: transform .5s var(--ease);
  z-index: 3;
}
.b-tile__body {
  position: absolute; left: 20px; right: 20px; bottom: 18px; z-index: 2;
}
.b-tile__client {
  font: 600 9.5px/1 var(--mono); letter-spacing: .18em; color: var(--red-text); margin-bottom: 8px;
}
.b-tile__title {
  font-family: var(--display); font-size: clamp(20px, 2.4vw, 36px); line-height: .88; color: #fff; letter-spacing: .01em;
  margin-bottom: 6px;
}
.b-tile__meta {
  font: 400 11px/1.4 var(--sans); color: rgba(255,255,255,.65);
  opacity: 0; max-height: 0; overflow: hidden;
  transition: opacity .5s var(--ease), max-height .5s var(--ease);
}
.b-tile[data-feat="hero"] .b-tile__title { font-size: clamp(36px, 4.5vw, 68px); }
.b-tile[data-feat="wide"] .b-tile__title { font-size: clamp(30px, 3.8vw, 54px); }
.b-tile[data-feat="tall"] .b-tile__title { font-size: clamp(24px, 2.8vw, 42px); }
.b-tile[data-feat="hero"] .b-tile__meta,
.b-tile[data-feat="wide"] .b-tile__meta,
.b-tile[data-feat="tall"] .b-tile__meta { opacity: 1; max-height: 80px; margin-top: 6px; }
.b-tile[data-feat="hero"] .b-tile__body { left: 32px; right: 32px; bottom: 32px; }
.b-tile[data-feat="hero"] .b-tile__client,
.b-tile[data-feat="wide"] .b-tile__client { font-size: 11px; margin-bottom: 12px; }

.b-tile__peek {
  position: absolute; top: 20px; right: 20px; z-index: 3;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 12px; background: rgba(10,10,10,.5); backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,.2);
  font: 600 9.5px/1 var(--mono); letter-spacing: .16em; color: #fff;
  opacity: 0; transform: translateY(-6px);
  transition: opacity .35s var(--ease), transform .35s var(--ease), background .3s ease;
}
.b-tile__peek span { font-size: 12px; transition: transform .3s ease; }

/* Reveal on scroll */
.b-tile { opacity: 0; transform: translateY(24px); transition: opacity .8s var(--ease), transform .8s var(--ease), filter .5s var(--ease); }
.b-tile.is-in { opacity: 1; transform: translateY(0); }

/* Hover focus effect */
@media (hover: hover) and (pointer: fine) {
  .b-grid:has(.b-tile:hover) .b-tile:not(:hover) {
    filter: grayscale(80%) brightness(.4); transform: scale(.985);
  }
  .b-grid:has(.b-tile:hover) .b-tile:not(:hover) .b-tile__img { transform: scale(1); filter: grayscale(60%) brightness(.6); }
  .b-tile:hover .b-tile__img { transform: scale(1.06); filter: grayscale(0%) brightness(1); }
  .b-tile:hover .b-tile__scrim { opacity: .5; }
  .b-tile:hover .b-tile__rail { transform: scaleY(1); }
  .b-tile:hover .b-tile__peek { opacity: 1; transform: none; }
  .b-tile:hover .b-tile__peek:hover { background: var(--red); border-color: var(--red); }
  .b-tile:hover .b-tile__peek span { transform: translate(2px,-2px); }
}

/* Focus-visible (keyboard) */
.b-tile:focus-visible { outline: 2px solid var(--red); outline-offset: 4px; }

/* ——— Footer ——— */
.b-footer {
  padding: 100px 56px; text-align: center; border-top: 1px solid rgba(255,255,255,.06);
}
.b-footer__label { font: 500 11px/1 var(--mono); letter-spacing: .2em; color: var(--red-text); margin-bottom: 20px; }
.b-footer__title { font-family: var(--display); font-size: min(6vw,64px); line-height: .9; margin-bottom: 32px; }
.b-footer__back {
  display: inline-flex; align-items: center; gap: 10px; padding: 14px 22px;
  border: 1px solid rgba(255,255,255,.2); font: 600 12px/1 var(--mono); letter-spacing: .16em;
  transition: background .3s ease, border-color .3s ease;
}
.b-footer__back:hover { background: var(--red); border-color: var(--red); }

/* ——— Responsive ——— */
@media (max-width: 1200px) {
  .b-grid { grid-template-columns: repeat(4, 1fr); grid-auto-rows: 20vh; }
  .b-tile[data-feat="hero"] { grid-column: span 2; grid-row: span 2; }
  .b-tile[data-feat="wide"] { grid-column: span 4; grid-row: span 2; }
  .b-tile[data-feat="tall"] { grid-column: span 2; grid-row: span 2; }
  .b-tile[data-feat="square"] { grid-column: span 2; grid-row: span 2; }
  .b-tile { grid-column: span 2; grid-row: span 1; }
}
@media (max-width: 900px) {
  .b-header { padding: 72px 24px 32px; grid-template-columns: 1fr; gap: 16px; }
  .b-header__meta { text-align: left; }
  .b-index { padding: 12px 24px 80px; }
  .b-grid { grid-template-columns: repeat(2, 1fr); grid-auto-rows: 26vh; gap: 8px; }
  .b-tile,
  .b-tile[data-feat="hero"],
  .b-tile[data-feat="wide"],
  .b-tile[data-feat="tall"],
  .b-tile[data-feat="square"] { grid-column: span 2; grid-row: span 1; }
  .b-tile[data-feat="hero"] { grid-row: span 2; }
  .b-tile[data-feat="wide"] { grid-column: span 2; }
  .b-tile__meta { opacity: 1 !important; max-height: 80px !important; margin-top: 6px !important; }
  .b-tile__body { left: 20px; right: 20px; bottom: 20px; }
  .b-footer { padding: 80px 24px; }
}
@media (max-width: 560px) {
  .b-grid { grid-template-columns: 1fr; grid-auto-rows: 40vh; }
  .b-tile,
  .b-tile[data-feat="hero"],
  .b-tile[data-feat="wide"],
  .b-tile[data-feat="tall"],
  .b-tile[data-feat="square"] { grid-column: span 1; grid-row: span 1; }
  .b-tile[data-feat="hero"] { grid-row: span 2; }
}

@media (prefers-reduced-motion: reduce) {
  .b-tile, .b-tile__img, .b-tile__scrim, .b-tile__rail, .b-tile__peek { transition: none !important; }
  .b-tile { opacity: 1 !important; transform: none !important; }
  html { scroll-behavior: auto; }
}
</style>
</head>
<body>

<a href="previews/index.html" class="preview-back">← RETOUR AUX PISTES</a>

<!-- HEADER -->
<header class="b-header">
  <div class="b-header__block">
    <div class="b-header__eyebrow">
      <span class="b-header__eyebrow-line"></span>
      <span class="b-header__eyebrow-text">PISTE B · INDEX ÉDITORIAL</span>
    </div>
    <div class="b-header__titles">
      <h1 class="b-header__title">TRAVAUX<span class="red">.</span></h1>
      <span class="b-header__script">une sélection</span>
    </div>
    <p class="b-header__lead">Mur d'index curaté : les projets phares prennent la lumière, les autres composent le rythme. Aucun scroll-jack — la grille vit dans le flux de la page.</p>
  </div>
  <div class="b-header__meta">
    <b id="bTotal">12</b>
    <span>PROJETS</span>
  </div>
</header>

<!-- GRID -->
<section class="b-index">
  <div class="b-grid" id="bGrid"></div>
</section>

<!-- FOOTER -->
<section class="b-footer">
  <div class="b-footer__label">FIN DE L'INDEX</div>
  <h2 class="b-footer__title">Ton avis compte<span class="red">.</span></h2>
  <a href="previews/index.html" class="b-footer__back">← REVENIR AUX PISTES</a>
</section>

<script src="js/projects.js"></script>
<script>
(function(){
  'use strict';
  var REDUCE = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var projects = window.PROJECTS || [];

  // Feature map — curation manuelle pour la démo (dans la vraie vie : champ `feature` dans js/projects.js)
  var featureMap = {
    'hakai-allumer': 'hero',
    'wsc-affichage': 'wide',
    'maison-lyne-st-andre': 'tall',
    'wsc-spot': 'wide',
    'hakai-lune': 'square',
    '97-cafe': 'square'
  };

  function ytThumb(id) { return 'https://img.youtube.com/vi/' + id + '/maxresdefault.jpg'; }
  function ytThumbHq(id) { return 'https://img.youtube.com/vi/' + id + '/hqdefault.jpg'; }
  function cardImage(p) { return p.image || (p.youtube ? ytThumb(p.youtube) : ''); }
  function stripTags(s) { return String(s).replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim(); }

  var grid = document.getElementById('bGrid');
  document.getElementById('bTotal').textContent = String(projects.length).padStart(2, '0');
  if (!grid || !projects.length) return;

  grid.innerHTML = projects.map(function(p) {
    var feat = featureMap[p.slug] || '';
    var img = cardImage(p);
    var label = stripTags(p.client) + ' — ' + stripTags(p.title);
    return '' +
      '<a class="b-tile" data-feat="' + feat + '" data-slug="' + (p.slug || '') + '" href="projet.html?p=' + (p.slug || '') + '" target="_blank" aria-label="' + label + '">' +
        '<div class="b-tile__img" style="background-image:url(\'' + img + '\')" data-yt="' + (p.youtube || '') + '"></div>' +
        '<div class="b-tile__scrim"></div>' +
        '<div class="b-tile__rail"></div>' +
        '<div class="b-tile__peek">OUVRIR <span>↗</span></div>' +
        '<div class="b-tile__body">' +
          '<div class="b-tile__client">' + p.client + '</div>' +
          '<div class="b-tile__title">' + p.title + '</div>' +
          '<div class="b-tile__meta">' + (p.role || '') + (p.year ? ' · ' + p.year : '') + '</div>' +
        '</div>' +
      '</a>';
  }).join('');

  // Youtube thumbnail fallback
  Array.prototype.forEach.call(document.querySelectorAll('.b-tile__img[data-yt]'), function(el) {
    var yt = el.getAttribute('data-yt'); if (!yt) return;
    var probe = new Image();
    probe.onload = function() {
      if (probe.naturalWidth <= 120) el.style.backgroundImage = "url('" + ytThumbHq(yt) + "')";
    };
    probe.onerror = function() { el.style.backgroundImage = "url('" + ytThumbHq(yt) + "')"; };
    probe.src = ytThumb(yt);
  });

  // Reveal on scroll — cascade légère
  var tiles = Array.prototype.slice.call(grid.querySelectorAll('.b-tile'));
  if (REDUCE || !('IntersectionObserver' in window)) {
    tiles.forEach(function(t) { t.classList.add('is-in'); });
    return;
  }
  var io = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      var el = e.target;
      var idx = tiles.indexOf(el);
      if (e.isIntersecting) {
        el.style.transitionDelay = (Math.min(idx, 8) * 60) + 'ms';
        el.classList.add('is-in');
      } else {
        el.style.transitionDelay = '0ms';
        el.classList.remove('is-in');
      }
    });
  }, { threshold: 0.15, rootMargin: '0px 0px -6% 0px' });
  tiles.forEach(function(t) { io.observe(t); });
})();
</script>
</body>
</html>
